<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soul Ark — Saint of the Day</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0c; font-family: Georgia, serif; color: #d4c9a8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
  .label { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: #b79743; margin-bottom: 28px; text-align: center; }
  .card { max-width: 520px; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid #2a2a30; box-shadow: 0 20px 60px rgba(0,0,0,0.7); background: #0d0d10; }
  .icon-area { width: 100%; background: radial-gradient(ellipse at 50% 60%, #1c1608 0%, #0a0a0c 75%); display: flex; align-items: center; justify-content: center; padding: 36px 0 28px; border-bottom: 1px solid #1e1e26; }
  .icon-area svg { filter: drop-shadow(0 0 18px rgba(183,151,67,0.25)); }
  .card-content { padding: 24px 28px 30px; }
  .saint-name { font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase; color: #b79743; margin-bottom: 14px; }
  .quote { font-size: 17px; line-height: 1.7; color: #ffffff; font-style: italic; margin-bottom: 20px; }
  .divider { width: 36px; height: 1px; background: #b79743; margin-bottom: 14px; }
  .date-line { font-size: 10px; color: #444; letter-spacing: 0.2em; text-transform: uppercase; }
  .nav { display: flex; justify-content: center; gap: 12px; margin-top: 22px; }
  .nav button { background: transparent; border: 1px solid #2a2a30; color: #777; font-family: Georgia, serif; font-size: 12px; padding: 8px 22px; border-radius: 99px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.1em; }
  .nav button:hover { border-color: #b79743; color: #b79743; }
  .footer-note { margin-top: 18px; font-size: 10px; color: #2a2a2a; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
</style>
</head>
<body>

<div class="label">Soul Ark · Daily Wisdom</div>

<div class="card">
  <div class="icon-area">
    <div id="saintIcon"></div>
  </div>
  <div class="card-content">
    <div class="saint-name" id="saintName"></div>
    <div class="quote" id="saintQuote"></div>
    <div class="divider"></div>
    <div class="date-line" id="dateLine"></div>
  </div>
</div>

<div class="nav">
  <button onclick="prev()">← Previous</button>
  <button onclick="next()">Next →</button>
</div>
<div class="footer-note">A new saint every day</div>

<script>

// SVG icon portraits — each saint has a unique face, beard, halo, robe colour
const ICONS = {
  bishop: (robe, beard) => `
    <svg width="160" height="200" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Halo -->
      <circle cx="80" cy="72" r="52" fill="none" stroke="#b79743" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.6"/>
      <circle cx="80" cy="72" r="46" fill="none" stroke="#b79743" stroke-width="0.5" opacity="0.4"/>
      <!-- Cross on halo -->
      <line x1="80" y1="26" x2="80" y2="50" stroke="#b79743" stroke-width="1.2" opacity="0.5"/>
      <line x1="68" y1="36" x2="92" y2="36" stroke="#b79743" stroke-width="1.2" opacity="0.5"/>
      <!-- Robe -->
      <path d="M 30 170 Q 40 130 55 118 L 80 128 L 105 118 Q 120 130 130 170 Z" fill="${robe}" opacity="0.9"/>
      <!-- Omophorion / vestment detail -->
      <path d="M 55 118 Q 80 136 105 118" fill="none" stroke="#b79743" stroke-width="1" opacity="0.6"/>
      <line x1="80" y1="128" x2="80" y2="175" stroke="#b79743" stroke-width="0.8" opacity="0.4"/>
      <!-- Neck -->
      <rect x="72" y="108" width="16" height="14" rx="4" fill="#c8a882"/>
      <!-- Head -->
      <ellipse cx="80" cy="88" rx="28" ry="32" fill="#c8a882"/>
      <!-- Hair -->
      <path d="M 52 80 Q 54 54 80 52 Q 106 54 108 80" fill="${beard}" opacity="0.85"/>
      <!-- Beard -->
      <path d="M 58 100 Q 60 120 80 124 Q 100 120 102 100 Q 90 112 80 112 Q 70 112 58 100Z" fill="${beard}" opacity="0.85"/>
      <!-- Eyes -->
      <ellipse cx="70" cy="86" rx="4" ry="3.5" fill="#1a1a1a"/>
      <ellipse cx="90" cy="86" rx="4" ry="3.5" fill="#1a1a1a"/>
      <circle cx="71" cy="85" r="1.2" fill="#fff" opacity="0.6"/>
      <circle cx="91" cy="85" r="1.2" fill="#fff" opacity="0.6"/>
      <!-- Nose -->
      <path d="M 78 90 Q 80 96 82 90" fill="none" stroke="#a07850" stroke-width="1"/>
      <!-- Mouth -->
      <path d="M 73 103 Q 80 107 87 103" fill="none" stroke="#8a6040" stroke-width="1.2"/>
      <!-- Eyebrows -->
      <path d="M 64 81 Q 70 78 76 81" fill="none" stroke="${beard}" stroke-width="1.5" opacity="0.8"/>
      <path d="M 84 81 Q 90 78 96 81" fill="none" stroke="${beard}" stroke-width="1.5" opacity="0.8"/>
    </svg>`,

  monk: (robe, beard) => `
    <svg width="160" height="200" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Halo -->
      <circle cx="80" cy="70" r="50" fill="none" stroke="#b79743" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.6"/>
      <circle cx="80" cy="70" r="44" fill="none" stroke="#b79743" stroke-width="0.5" opacity="0.35"/>
      <!-- Cross -->
      <line x1="80" y1="22" x2="80" y2="46" stroke="#b79743" stroke-width="1.2" opacity="0.5"/>
      <line x1="68" y1="33" x2="92" y2="33" stroke="#b79743" stroke-width="1.2" opacity="0.5"/>
      <!-- Monastic robe / ryassa -->
      <path d="M 28 175 Q 38 132 52 120 L 80 130 L 108 120 Q 122 132 132 175 Z" fill="${robe}" opacity="0.95"/>
      <!-- Klobuk (monastic hat) -->
      <ellipse cx="80" cy="56" rx="30" ry="10" fill="${robe}"/>
      <path d="M 50 56 Q 50 34 80 32 Q 110 34 110 56" fill="${robe}"/>
      <path d="M 50 56 L 45 90 M 110 56 L 115 90" fill="none" stroke="${robe}" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
      <!-- Neck -->
      <rect x="73" y="108" width="14" height="14" rx="3" fill="#c8a882"/>
      <!-- Head -->
      <ellipse cx="80" cy="88" rx="26" ry="30" fill="#c8a882"/>
      <!-- Beard (long monastic) -->
      <path d="M 56 102 Q 58 130 80 136 Q 102 130 104 102 Q 92 116 80 116 Q 68 116 56 102Z" fill="${beard}" opacity="0.9"/>
      <!-- Eyes -->
      <ellipse cx="71" cy="87" rx="3.5" ry="3" fill="#1a1a1a"/>
      <ellipse cx="89" cy="87" rx="3.5" ry="3" fill="#1a1a1a"/>
      <circle cx="72" cy="86" r="1" fill="#fff" opacity="0.6"/>
      <circle cx="90" cy="86" r="1" fill="#fff" opacity="0.6"/>
      <!-- Nose -->
      <path d="M 78 91 Q 80 96 82 91" fill="none" stroke="#a07850" stroke-width="1"/>
      <!-- Mouth -->
      <path d="M 74 102 Q 80 106 86 102" fill="none" stroke="#8a6040" stroke-width="1.2"/>
      <!-- Eyebrows -->
      <path d="M 65 82 Q 71 79 77 82" fill="none" stroke="${beard}" stroke-width="1.5" opacity="0.8"/>
      <path d="M 83 82 Q 89 79 95 82" fill="none" stroke="${beard}" stroke-width="1.5" opacity="0.8"/>
    </svg>`,

  elder: (robe, beard) => `
    <svg width="160" height="200" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Halo -->
      <circle cx="80" cy="68" r="50" fill="none" stroke="#b79743" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.6"/>
      <circle cx="80" cy="68" r="44" fill="none" stroke="#b79743" stroke-width="0.5" opacity="0.35"/>
      <line x1="80" y1="20" x2="80" y2="44" stroke="#b79743" stroke-width="1.2" opacity="0.5"/>
      <line x1="68" y1="31" x2="92" y2="31" stroke="#b79743" stroke-width="1.2" opacity="0.5"/>
      <!-- Robe -->
      <path d="M 25 178 Q 38 135 54 122 L 80 132 L 106 122 Q 122 135 135 178 Z" fill="${robe}" opacity="0.9"/>
      <!-- Neck -->
      <rect x="72" y="108" width="16" height="14" rx="4" fill="#c0987a"/>
      <!-- Head (older, slightly larger) -->
      <ellipse cx="80" cy="86" rx="30" ry="34" fill="#c0987a"/>
      <!-- White long elder beard -->
      <path d="M 52 100 Q 50 138 80 148 Q 110 138 108 100 Q 94 120 80 120 Q 66 120 52 100Z" fill="${beard}"/>
      <!-- White hair / wreath -->
      <path d="M 50 78 Q 52 50 80 48 Q 108 50 110 78" fill="${beard}" opacity="0.7"/>
      <!-- Wrinkle lines -->
      <path d="M 60 82 Q 68 80 70 82" fill="none" stroke="#a07850" stroke-width="0.7" opacity="0.5"/>
      <path d="M 90 82 Q 92 80 100 82" fill="none" stroke="#a07850" stroke-width="0.7" opacity="0.5"/>
      <path d="M 66 95 Q 80 98 94 95" fill="none" stroke="#a07850" stroke-width="0.6" opacity="0.4"/>
      <!-- Eyes (gentle, slightly squinting) -->
      <path d="M 66 86 Q 70 83 74 86 Q 70 89 66 86Z" fill="#2a1a0a"/>
      <path d="M 86 86 Q 90 83 94 86 Q 90 89 86 86Z" fill="#2a1a0a"/>
      <circle cx="70" cy="85" r="0.9" fill="#fff" opacity="0.5"/>
      <circle cx="90" cy="85" r="0.9" fill="#fff" opacity="0.5"/>
      <!-- Nose -->
      <path d="M 77 91 Q 80 97 83 91" fill="none" stroke="#906040" stroke-width="1.1"/>
      <!-- Peaceful smile -->
      <path d="M 72 104 Q 80 109 88 104" fill="none" stroke="#7a5030" stroke-width="1.3"/>
      <!-- Eyebrows (bushy) -->
      <path d="M 62 80 Q 70 76 76 80" fill="none" stroke="${beard}" stroke-width="2" opacity="0.9"/>
      <path d="M 84 80 Q 90 76 98 80" fill="none" stroke="${beard}" stroke-width="2" opacity="0.9"/>
    </svg>`
};

const G = ICONS;

const SAINTS = [
  { name: "St. John Chrysostom", quote: "If you cannot find Christ in the beggar at the church door, you will not find Him in the chalice.", type: "bishop", robe: "#1a2a4a", beard: "#4a3a2a" },
  { name: "St. Seraphim of Sarov", quote: "Acquire a peaceful spirit, and thousands around you will be saved.", type: "monk", robe: "#1a1a1a", beard: "#e8e0d0" },
  { name: "St. Augustine of Hippo", quote: "Our heart is restless until it rests in Thee.", type: "bishop", robe: "#2a1a0a", beard: "#2a2018" },
  { name: "St. Isaac the Syrian", quote: "Blessed is the man who knows his own weakness, because this knowledge becomes to him the foundation of all that is good.", type: "monk", robe: "#0a1a0a", beard: "#5a4a30" },
  { name: "St. Anthony the Great", quote: "I no longer fear God, but I love Him. For love casts out fear.", type: "elder", robe: "#1a1210", beard: "#d8d0c0" },
  { name: "St. Paisios of Mount Athos", quote: "Do not seek a perfect spiritual guide. Seek God, and He will send you what you need.", type: "monk", robe: "#0a0a0a", beard: "#c8c0a8" },
  { name: "St. Theophan the Recluse", quote: "Stand before God with your mind in your heart, and be at peace.", type: "bishop", robe: "#1a2a1a", beard: "#3a3028" },
  { name: "St. John of Kronstadt", quote: "Do not look for rest in any pleasure. You were created for joy, not for pleasure.", type: "bishop", robe: "#1e1a2a", beard: "#2a2018" },
  { name: "St. Nikolai Velimirovich", quote: "Faith is the beginning and love is the end, and their union is God.", type: "bishop", robe: "#1a1a2a", beard: "#2a2820" },
  { name: "St. Basil the Great", quote: "A tree is known by its fruit. A man is known by his deeds. A good deed is never lost.", type: "bishop", robe: "#1a0a2a", beard: "#3a2820" },
  { name: "St. Silouan the Athonite", quote: "Blessed is the soul that loves its brother, for our brother is our life.", type: "monk", robe: "#101010", beard: "#c0b8a0" },
  { name: "St. Ephrem the Syrian", quote: "Do not accept anything as love which lacks truth. One cannot exist without the other.", type: "elder", robe: "#1a1008", beard: "#b0a888" },
  { name: "St. John of the Ladder", quote: "Do not be surprised that you fall every day. Do not give up. Stand your ground bravely.", type: "monk", robe: "#0a0a12", beard: "#6a5a3a" },
  { name: "St. Ignatius Brianchaninov", quote: "Humility is the mother of salvation.", type: "bishop", robe: "#0a1a2a", beard: "#3a3020" },
  { name: "St. Tikhon of Zadonsk", quote: "Hardship teaches us what comfort makes us forget — that we are nothing without God.", type: "bishop", robe: "#1a0a1a", beard: "#4a3820" },
  { name: "St. Porphyrios of Kavsokalyvia", quote: "Love Christ and don't worry about anything else. Everything else will fall into place.", type: "elder", robe: "#080808", beard: "#e0d8c8" },
  { name: "St. Maximus the Confessor", quote: "God, who is beyond all things, revealed Himself most clearly in the poverty of the cross.", type: "monk", robe: "#0a0a1a", beard: "#4a4030" },
  { name: "St. Nectarios of Aegina", quote: "Seek the grace of the Holy Spirit and you will find peace in your soul.", type: "bishop", robe: "#1a2a1a", beard: "#2a2010" },
  { name: "St. Herman of Alaska", quote: "From this day, from this hour, from this very minute, let us love God above all.", type: "monk", robe: "#0a1010", beard: "#e0d8c8" },
  { name: "St. Ambrose of Optina", quote: "We must live — not as we wish, but as God wills.", type: "elder", robe: "#101008", beard: "#d0c8b0" },
  { name: "St. Macarius the Great", quote: "The soul that loves God has no rest, and cannot be satisfied in this present age.", type: "elder", robe: "#181008", beard: "#c8c0a0" },
  { name: "St. Gregory the Theologian", quote: "It is better to be a poor man and to have virtue, than to be a king and to misuse power.", type: "bishop", robe: "#1e1228", beard: "#3a2818" },
  { name: "St. John Chrysostom", quote: "Prayer is the place of refuge for every worry, a foundation for cheerfulness, a source of constant happiness.", type: "bishop", robe: "#1a2a4a", beard: "#4a3a2a" },
  { name: "St. Seraphim of Sarov", quote: "You cannot be too gentle, too kind. Shun even to appear harsh in your treatment of each other.", type: "monk", robe: "#1a1a1a", beard: "#e8e0d0" },
  { name: "St. Isaac the Syrian", quote: "The man who has learned his own weakness has reached the beginning of wisdom.", type: "monk", robe: "#0a1a0a", beard: "#5a4a30" },
  { name: "St. Anthony the Great", quote: "The greatest thing a man can do is to throw his sins before God and to expect temptation to his last breath.", type: "elder", robe: "#1a1210", beard: "#d8d0c0" },
  { name: "St. Silouan the Athonite", quote: "Keep your mind in hell and despair not.", type: "monk", robe: "#101010", beard: "#c0b8a0" },
  { name: "St. Paisios of Mount Athos", quote: "The person who has humility has everything, because God gives grace to the humble.", type: "monk", robe: "#0a0a0a", beard: "#c8c0a8" },
  { name: "St. Nikolai Velimirovich", quote: "The man who forgives is stronger than the man who fights. For he has conquered himself.", type: "bishop", robe: "#1a1a2a", beard: "#2a2820" },
  { name: "St. Basil the Great", quote: "Many have different gifts — but the greatest is the capacity to love your enemy.", type: "bishop", robe: "#1a0a2a", beard: "#3a2820" },
  { name: "St. Theophan the Recluse", quote: "Descend with your attention into the heart. Stand there before the Lord and admit nothing sinful.", type: "bishop", robe: "#1a2a1a", beard: "#3a3028" },
  { name: "St. John of Kronstadt", quote: "Without struggle, no progress. Without sacrifice, no victory.", type: "bishop", robe: "#1e1a2a", beard: "#2a2018" },
  { name: "St. Ephrem the Syrian", quote: "The man of prayer is the man of power.", type: "elder", robe: "#1a1008", beard: "#b0a888" },
  { name: "St. Augustine of Hippo", quote: "Thou madest us for Thyself, and our heart is restless until it repose in Thee.", type: "bishop", robe: "#2a1a0a", beard: "#2a2018" },
  { name: "St. John of the Ladder", quote: "Do not be surprised that you fall every day. Do not give up. Stand your ground bravely.", type: "monk", robe: "#0a0a12", beard: "#6a5a3a" },
];

const today = new Date();
const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
let offset = 0;

function getIndex() { return ((dayOfYear + offset) % SAINTS.length + SAINTS.length) % SAINTS.length; }

function formatDate(d) { return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }

function render() {
  const s = SAINTS[getIndex()];
  const displayDate = new Date(today);
  displayDate.setDate(today.getDate() + offset);
  document.getElementById('saintName').textContent = s.name;
  document.getElementById('saintQuote').textContent = '“' + s.quote + '”';
  document.getElementById('dateLine').textContent = formatDate(displayDate);
  const iconFn = ICONS[s.type];
  document.getElementById('saintIcon').innerHTML = iconFn(s.robe, s.beard);
}

function prev() { offset--; render(); }
function next() { offset++; render(); }

render();
</script>
</body>
</html>
