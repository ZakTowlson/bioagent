<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soul Ark — Daily Wisdom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0c; font-family: Georgia, serif; color: #d4c9a8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; }

  .label { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: #b79743; margin-bottom: 20px; text-align: center; }

  .card {
    max-width: 520px;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2a30;
    box-shadow: 0 24px 64px rgba(0,0,0,0.9);
    position: relative;
  }

  /* Background image — fills the whole card */
  .card-bg {
    position: relative;
    width: 100%;
    min-height: 480px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .card-bg img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: grayscale(30%) contrast(1.1) brightness(0.55);
  }

  /* Dark gradient so text is readable at bottom */
  .card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.2) 30%,
      rgba(0,0,0,0.75) 60%,
      rgba(10,10,12,0.97) 100%
    );
  }

  .card-content {
    position: relative;
    z-index: 2;
    padding: 0 28px 28px;
  }

  .saint-name {
    font-size: 9px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: #b79743;
    margin-bottom: 12px;
  }

  .quote {
    font-size: 19px;
    line-height: 1.7;
    color: #ffffff;
    font-style: italic;
    margin-bottom: 20px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }

  .divider { width: 32px; height: 1px; background: #b79743; margin-bottom: 12px; opacity: 0.5; }

  .date-line { font-size: 10px; color: #555; letter-spacing: 0.2em; text-transform: uppercase; }

  .nav { display: flex; justify-content: center; gap: 12px; margin-top: 18px; }
  .nav button {
    background: transparent;
    border: 1px solid #222228;
    color: #666;
    font-family: Georgia, serif;
    font-size: 11px;
    padding: 8px 22px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }
  .nav button:hover { border-color: #b79743; color: #b79743; }
  .footer-note { margin-top: 14px; font-size: 10px; color: #1e1e1e; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
</style>
</head>
<body>

<div class="label">Soul Ark · Daily Wisdom</div>

<div class="card">
  <div class="card-bg">
    <img src="/jesus.png" alt=""/>
    <div class="card-content">
      <div class="saint-name" id="saintName"></div>
      <div class="quote" id="saintQuote"></div>
      <div class="divider"></div>
      <div class="date-line" id="dateLine"></div>
    </div>
  </div>
</div>

<div class="footer-note">Updates every day</div>

<script>
const SAINTS = [
  { name: "St. John Chrysostom", quote: "If you cannot find Christ in the beggar at the church door, you will not find Him in the chalice." },
  { name: "St. Seraphim of Sarov", quote: "Acquire a peaceful spirit, and thousands around you will be saved." },
  { name: "St. Augustine of Hippo", quote: "Our heart is restless until it rests in Thee." },
  { name: "St. Isaac the Syrian", quote: "Blessed is the man who knows his own weakness, because this knowledge becomes to him the foundation of all that is good." },
  { name: "St. Anthony the Great", quote: "I no longer fear God, but I love Him. For love casts out fear." },
  { name: "St. Paisios of Mount Athos", quote: "Do not seek a perfect spiritual guide. Seek God, and He will send you what you need." },
  { name: "St. Theophan the Recluse", quote: "Stand before God with your mind in your heart, and be at peace." },
  { name: "St. John of Kronstadt", quote: "Do not look for rest in any pleasure. You were created for joy, not for pleasure." },
  { name: "St. Nikolai Velimirovich", quote: "Faith is the beginning and love is the end, and their union is God." },
  { name: "St. Basil the Great", quote: "A tree is known by its fruit. A man is known by his deeds. A good deed is never lost." },
  { name: "St. Silouan the Athonite", quote: "Keep your mind in hell and despair not." },
  { name: "St. Ephrem the Syrian", quote: "The man of prayer is the man of power." },
  { name: "St. John of the Ladder", quote: "Do not be surprised that you fall every day. Do not give up. Stand your ground bravely." },
  { name: "St. Ignatius Brianchaninov", quote: "Humility is the mother of salvation." },
  { name: "St. Tikhon of Zadonsk", quote: "Hardship teaches us what comfort makes us forget — that we are nothing without God." },
  { name: "St. Porphyrios of Kavsokalyvia", quote: "Love Christ and don't worry about anything else. Everything else will fall into place." },
  { name: "St. Maximus the Confessor", quote: "God, who is beyond all things, revealed Himself most clearly in the poverty of the cross." },
  { name: "St. Nectarios of Aegina", quote: "Seek the grace of the Holy Spirit and you will find peace in your soul." },
  { name: "St. Herman of Alaska", quote: "From this day, from this hour, from this very minute, let us love God above all." },
  { name: "St. Ambrose of Optina", quote: "We must live — not as we wish, but as God wills." },
  { name: "St. Macarius the Great", quote: "The soul that loves God has no rest and cannot be satisfied in this present age." },
  { name: "St. Gregory the Theologian", quote: "It is better to be a poor man and to have virtue, than to be a king and to misuse power." },
  { name: "St. John Chrysostom", quote: "Prayer is the place of refuge for every worry, a foundation for cheerfulness, a source of constant happiness." },
  { name: "St. Seraphim of Sarov", quote: "You cannot be too gentle, too kind. Shun even to appear harsh in your treatment of each other." },
  { name: "St. Isaac the Syrian", quote: "The man who has learned his own weakness has reached the beginning of wisdom." },
  { name: "St. Anthony the Great", quote: "The greatest thing a man can do is to throw his sins before God and to expect temptation to his last breath." },
  { name: "St. Silouan the Athonite", quote: "Blessed is the soul that loves its brother, for our brother is our life." },
  { name: "St. Paisios of Mount Athos", quote: "The person who has humility has everything, because God gives grace to the humble." },
  { name: "St. Nikolai Velimirovich", quote: "The man who forgives is stronger than the man who fights. For he has conquered himself." },
  { name: "St. Basil the Great", quote: "Many have different gifts — but the greatest is the capacity to love your enemy." },
  { name: "St. Theophan the Recluse", quote: "Descend with your attention into the heart. Stand there before the Lord and admit nothing sinful." },
  { name: "St. John of Kronstadt", quote: "Without struggle, no progress. Without sacrifice, no victory." },
  { name: "St. Ephrem the Syrian", quote: "Do not accept anything as love which lacks truth. One cannot exist without the other." },
  { name: "St. Augustine of Hippo", quote: "Thou madest us for Thyself, and our heart is restless until it repose in Thee." },
  { name: "St. John of the Ladder", quote: "The soul that truly loves God needs no teacher — God Himself teaches it." },
];

const today = new Date();
const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
let offset = 0;

function getIndex() { return ((dayOfYear + offset) % SAINTS.length + SAINTS.length) % SAINTS.length; }
function formatDate(d) { return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }

function render() {
  const s = SAINTS[getIndex()];
  const d = new Date(today);
  d.setDate(today.getDate() + offset);
  document.getElementById('saintName').textContent = s.name;
  document.getElementById('saintQuote').textContent = '“' + s.quote + '”';
  document.getElementById('dateLine').textContent = formatDate(d);
}

function prev() { offset--; render(); }
function next() { offset++; render(); }
render();
</script>
</body>
</html>
