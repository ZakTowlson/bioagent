<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soul Ark — Saint of the Day</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0c; font-family: Georgia, serif; color: #d4c9a8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; }
  .label { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: #b79743; margin-bottom: 24px; text-align: center; }
  .card { max-width: 500px; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid #2a2a30; box-shadow: 0 20px 60px rgba(0,0,0,0.8); background: #0d0d10; }
  .icon-area { width: 100%; background: radial-gradient(ellipse at 50% 40%, #1a1408 0%, #080808 80%); display: flex; align-items: center; justify-content: center; padding: 28px 0 20px; border-bottom: 1px solid #1e1e22; position: relative; }
  .icon-area::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 100%, rgba(183,151,67,0.06) 0%, transparent 70%); pointer-events: none; }
  .card-content { padding: 22px 26px 28px; }
  .saint-name { font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase; color: #b79743; margin-bottom: 12px; }
  .quote { font-size: 16px; line-height: 1.75; color: #f0ece0; font-style: italic; margin-bottom: 18px; }
  .divider { width: 32px; height: 1px; background: #b79743; margin-bottom: 12px; opacity: 0.6; }
  .date-line { font-size: 10px; color: #3a3a3a; letter-spacing: 0.2em; text-transform: uppercase; }
  .nav { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
  .nav button { background: transparent; border: 1px solid #222228; color: #666; font-family: Georgia, serif; font-size: 11px; padding: 8px 22px; border-radius: 99px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.1em; }
  .nav button:hover { border-color: #b79743; color: #b79743; }
  .footer-note { margin-top: 16px; font-size: 10px; color: #222; letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }
</style>
</head>
<body>

<div class="label">Soul Ark · Daily Wisdom</div>
<div class="card">
  <div class="icon-area"><div id="saintIcon"></div></div>
  <div class="card-content">
    <div class="saint-name" id="saintName"></div>
    <div class="quote" id="saintQuote"></div>
    <div class="divider"></div>
    <div class="date-line" id="dateLine"></div>
  </div>
</div>
<div class="nav">
  <button onclick="prev()">← Previous</button>
  <button onclick="next()">Next →</button>
</div>
<div class="footer-note">A new saint every day</div>

<script>

// Engraving-style SVG portraits
// Each returns a full SVG string with cross-hatching, detailed vestments, staff

  </g>
  <!-- Forehead lines -->

  <!-- Eyes -->

  <!-- Neck -->
  <rect x="80" y="104" width="20" height="16" rx="2" fill="#0d0d10" stroke="#b79743" stroke-width="0.5"/>

  <!-- Chasuble / outer vestment -->
  <path d="M 20 255 Q 25 190 40 160 Q 55 138 70 130 L 90 138 L 110 130 Q 125 138 140 160 Q 155 190 160 255 Z" fill="#0d0d10" stroke="#b79743" stroke-width="0.8"/>

  <line x1="126" y1="130" x2="130" y2="120" stroke="#b79743" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Crozier decorations -->

  <line x1="54" y1="200" x2="60" y2="200" stroke="#b79743" stroke-width="1" opacity="0.5"/>

  <!-- Ground shadow -->
  <ellipse cx="90" cy="256" rx="65" ry="4" fill="#b79743" opacity="0.06"/>
</svg>`;
}

  <!-- Beard hatch -->

const today = new Date();
const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
let offset = 0;

function getIndex() { return ((dayOfYear + offset) % SAINTS.length + SAINTS.length) % SAINTS.length; }
function formatDate(d) { return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }

function render() {
  const s = SAINTS[getIndex()];
  const displayDate = new Date(today);
  displayDate.setDate(today.getDate() + offset);
  document.getElementById('saintName').textContent = s.name;
  document.getElementById('saintQuote').textContent = '“' + s.quote + '”';
  document.getElementById('dateLine').textContent = formatDate(displayDate);
  document.getElementById('saintIcon').innerHTML = ICONS[s.type](s.angle);
}

function prev() { offset--; render(); }
function next() { offset++; render(); }
